workflows:
  ios-release:
    name: iOS App Store Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: key
    environment:
      xcode: latest
      vars:
        # Tuist will use this Bundle ID and App Name when generating the Xcode project
        TUIST_BUNDLE_ID: "com.thejobsadvertise.app"
        TUIST_APP_NAME: "The Jobs Advertise"
    scripts:
      - name: Install Tuist
        script: |
          echo "Installing Tuist via Homebrew..."
          brew install tuist
      - name: Generate Xcode Project with Tuist
        script: |
          echo "Configuring Median SPM Registry..."
          swift package-registry set https://packages.median.co --scope median --global
          echo "Generating workspace..."
          # This generates the .xcodeproj and .xcworkspace files based on Project.swift
          tuist generate
      - name: Fetch and set up Code Signing
        script: |
          echo "Initializing Keychain..."
          keychain initialize
          
          echo "Downloading/Creating Provisioning Profiles from Apple Developer Portal..."
          # This Codemagic command will automatically create the App ID and Provisioning Profile if they don't exist!
          app-store-connect fetch-signing-files "$TUIST_BUNDLE_ID" --type IOS_APP_STORE --create
          
          echo "Adding Certificates to Keychain..."
          keychain add-certificates
          
          echo "Applying the profiles to the Xcode project..."
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          echo "Building the iOS app..."
          # Dynamically find the workspace generated by Tuist
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          
          # Use the target name defined in Project.swift
          SCHEME="Median" 
          
          # Build a SIGNED IPA for the App Store
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      
    publishing:
      # Automatically publish to App Store Connect / TestFlight
      app_store_connect:
        auth: integration
        submit_to_testflight: true
