workflows:
  ios-release:
    name: iOS App Store Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: key
    environment:
      xcode: latest
    scripts:
      - name: Install Tuist
        script: |
          echo "Installing Tuist..."
          curl -Ls https://install.tuist.io | bash
      - name: Generate Xcode Project with Tuist
        script: |
          echo "Generating workspace..."
          # This generates the .xcodeproj and .xcworkspace files based on Project.swift
          tuist generate
      - name: Set up code signing settings on Xcode project
        script: |
          # Codemagic CLI tool to automatically configure code signing
          # It fetches the certificates from the connected Apple account and applies them
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          echo "Building the iOS app..."
          # Dynamically find the workspace generated by Tuist
          WORKSPACE=$(ls -1 *.xcworkspace | head -n 1)
          
          # Use the target name defined in Project.swift
          SCHEME="Median" 
          
          # Build a SIGNED IPA for the App Store
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      
    publishing:
      # Automatically publish to App Store Connect / TestFlight
      app_store_connect:
        auth: integration
        submit_to_testflight: true
