workflows:
  ios-release:
    name: iOS App Store Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: key
    environment:
      xcode: latest
      groups:
        - ios_signing
    scripts:
      - name: Install Tuist
        script: |
          echo "Installing Tuist via Homebrew..."
          brew install tuist
      - name: Generate Xcode Project with Tuist
        script: |
          echo "Configuring Median SPM Registry..."
          swift package-registry set https://packages.median.co --scope median --global
          echo "Generating workspace..."
          tuist generate
      - name: Fetch Profiles and Build IPA
        script: |
          echo "Initializing Keychain..."
          keychain initialize
          
          echo "Downloading Provisioning Profiles from Apple Developer Portal..."
          app-store-connect fetch-signing-files "com.thejobsadvertise.app" --type IOS_APP_STORE --create
          
          echo "Adding Certificates to Keychain..."
          keychain add-certificates
          
          echo "Building the iOS app..."
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME="Median" 
          
          echo "Forcing Xcode to use Profile UUID: $PROVISIONING_PROFILE"
          
          # Build the IPA, explicitly passing the downloaded profile UUID to Xcode
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --archive-xcargs "PROVISIONING_PROFILE_SPECIFIER=$PROVISIONING_PROFILE"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
